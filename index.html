<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Office Booking Platform</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
  <link
    rel="stylesheet"
    href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)"
  />
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="screen active">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <i class="fas fa-building"></i>
          <h1>Office Booking</h1>
          <p>Book your desk or meeting room</p>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <div class="demo-accounts">
          <p>Demo Accounts:</p>
          <button class="btn btn-outline btn-small" onclick="loginAsAdmin()">Admin Login</button>
          <button class="btn btn-outline btn-small" onclick="loginAsUser()">User Login</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Application -->
  <div id="mainApp" class="screen">
    <nav class="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-building"></i>
        <span>Office Space</span>
      </div>

      <ul class="nav-menu">
        <li class="nav-item active" data-tab="desks">
          <i class="fas fa-chair"></i><span>Desks</span>
        </li>
        <li class="nav-item" data-tab="meeting-rooms">
          <i class="fas fa-users"></i><span>Meeting Rooms</span>
        </li>
        <li class="nav-item" data-tab="my-bookings">
          <i class="fas fa-calendar-check"></i><span>My Bookings</span>
        </li>
        <li class="nav-item admin-only" data-tab="admin">
          <i class="fas fa-cog"></i><span>Admin Portal</span>
        </li>
      </ul>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">JD</div>
          <div class="user-details">
            <span id="userName">John Doe</span>
            <span id="userRole" class="role-badge">User</span>
          </div>
        </div>
        <button class="btn-icon" onclick="logout()" title="Logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </nav>

    <main class="main-content">
      <!-- Top bar logout -->
      <div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">
        <button class="btn btn-outline btn-small" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>

      <!-- Desk Booking Tab -->
      <div id="desksTab" class="tab-content active">
        <div class="content-header">
          <h2>Desk Booking</h2>
          <div class="date-selector">
            <input type="date" id="deskDate" class="date-input" />
          </div>
        </div>

        <div class="floor-selector">
          <label>Select Floor:</label>
          <select id="deskFloorSelect" class="select-input"></select>
        </div>

        <div class="map-container">
          <div id="deskMapWrapper" class="map-wrapper">
            <div class="map-canvas" id="deskMapCanvas">
              <img id="deskMapImage" src="" alt="Floor Map" />
              <div id="deskMapItems" class="map-items"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Meeting Rooms Tab -->
      <div id="meetingRoomsTab" class="tab-content">
        <div class="content-header">
          <h2>Meeting Rooms</h2>
        </div>
        <div id="meetingRoomsGrid" class="meeting-rooms-grid"></div>
      </div>

      <!-- My Bookings Tab -->
      <div id="myBookingsTab" class="tab-content">
        <div class="content-header">
          <h2>My Bookings</h2>
        </div>
        <div id="myBookingsList" class="bookings-container"></div>
      </div>

      <!-- Admin Portal -->
      <div id="adminTab" class="tab-content">
        <div class="content-header">
          <h2>Admin Portal</h2>
        </div>

        <div class="admin-tabs">
          <button class="admin-tab-btn active" data-admin-tab="floors">
            <i class="fas fa-layer-group"></i> Floors & Maps
          </button>
          <button class="admin-tab-btn" data-admin-tab="desks">
            <i class="fas fa-chair"></i> Manage Desks
          </button>
          <button class="admin-tab-btn" data-admin-tab="rooms">
            <i class="fas fa-door-open"></i> Meeting Rooms
          </button>
          <button class="admin-tab-btn" data-admin-tab="equipment">
            <i class="fas fa-tv"></i> Equipment
          </button>
          <button class="admin-tab-btn" data-admin-tab="users">
            <i class="fas fa-users-cog"></i> Users
          </button>
        </div>

        <div id="adminFloors" class="admin-content active"></div>
        <div id="adminDesks" class="admin-content"></div>
        <div id="adminRooms" class="admin-content"></div>
        <div id="adminEquipment" class="admin-content"></div>
        <div id="adminUsers" class="admin-content"></div>
      </div>
    </main>
  </div>

  <!-- JavaScript -->
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/booking.js"></script>
  <script src="js/mapEditor.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
